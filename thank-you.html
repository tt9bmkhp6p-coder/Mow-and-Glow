<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Request Received — Mow & Glow Home Services</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B1E3F;
    --navy-2:#142B54;
    --ink:#0E1726;
    --paper:#FFFFFF;
    --cream:#F5F5F3;
    --line:#E6E6E4;
    --muted:#6B7588;
    --moss: oklch(0.58 0.09 145);
    --display:"Bricolage Grotesque","Geist","Helvetica Neue",Arial,sans-serif;
    --sans:"Geist","Helvetica Neue",Arial,sans-serif;
    --mono:"Geist Mono",ui-monospace,"SFMono-Regular",Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100vh}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:var(--sans);
    font-size:17px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;
  }
  a{color:inherit}
  img{max-width:100%;display:block}
  .wrap{max-width:1240px;margin:0 auto;padding:0 28px}

  /* NAV */
  .nav{
    background:rgba(251,249,244,.9);
    backdrop-filter:saturate(140%) blur(10px);
    border-bottom:1px solid var(--line);
  }
  .nav-inner{display:flex;align-items:center;justify-content:space-between;padding:18px 0;}
  .brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--ink)}

  /* MAIN */
  .main{
    flex:1;display:flex;align-items:center;justify-content:center;
    padding:80px 28px;text-align:center;
  }
  .card{
    background:var(--paper);border:1px solid var(--line);border-radius:12px;
    padding:48px 40px;max-width:520px;width:100%;
  }
  .check{
    width:64px;height:64px;border-radius:50%;
    background:var(--moss);
    display:grid;place-items:center;margin:0 auto 24px;
    font-size:28px;color:var(--paper);
  }
  h1{
    font-family:var(--display);font-weight:500;
    font-size:clamp(32px,5vw,52px);
    line-height:1;letter-spacing:-0.035em;
    margin:0 0 14px;color:var(--navy);
  }
  h1 em{font-style:normal;color:var(--moss)}
  p{font-size:17px;color:#2a3243;margin:0 0 32px;max-width:38ch;margin-left:auto;margin-right:auto;}
  .details{
    background:var(--cream);border-radius:8px;padding:18px 20px;
    font-family:var(--mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--muted);margin-bottom:28px;line-height:1.8;
  }
  .btn{
    display:inline-flex;align-items:center;gap:10px;
    padding:14px 24px;border-radius:999px;
    font-size:15px;font-weight:500;text-decoration:none;
    border:1px solid var(--navy);cursor:pointer;min-height:48px;
    background:var(--navy);color:var(--paper);
    transition:background .15s ease;
  }
  .btn:hover{background:var(--navy-2)}

  @media(max-width:480px){
    .card{padding:32px 24px}
  }
</style>
</head>
<body>

  <header class="nav">
    <div class="wrap nav-inner">
      <a href="index.html" class="brand">
        <img src="logo.png" alt="Mow and Glow Home Services" height="44" style="display:block;width:auto">
      </a>
    </div>
  </header>

  <div class="main">
    <div class="card">
      <div class="check">✓</div>
      <h1>Request <em>received!</em></h1>
      <p>Thanks for reaching out — we'll send you a flat-rate quote within one business day.</p>
      <div class="details">
        Questions? Call or text us<br>
        (951) 434-8064 · Mon–Sat 8am–6pm
      </div>
      <a href="index.html" class="btn">Back to home →</a>
    </div>
  </div>

</body>
</html>
